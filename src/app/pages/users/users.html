<div class="page-transition">
  <nav class="flex mb-4 text-sm">
    <a href="#" class="text-primary hover:underline">User Management</a>
    <span class="mx-2 text-gray-400">›</span>
    <a href="#" class="text-primary hover:underline">Users</a>
    <span class="mx-2 text-gray-400">›</span>
    <span class="text-gray-600">Add User</span>
  </nav>

  <div class="bg-white rounded-lg shadow p-6">
    <div class="mb-8">
      <div class="flex items-center justify-center space-x-16 mb-8">
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center mb-2 font-semibold">1</div>
          <p class="text-sm font-medium text-primary">User Details</p>
        </div>
        <div class="flex-1 h-0.5 bg-gray-300"></div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mb-2">2</div>
          <p class="text-sm text-gray-500">Set Permissions</p>
        </div>
        <div class="flex-1 h-0.5 bg-gray-300"></div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mb-2">3</div>
          <p class="text-sm text-gray-500">Review and Add Tags</p>
        </div>
        <div class="flex-1 h-0.5 bg-gray-300"></div>
        <div class="flex flex-col items-center">
          <div class="w-12 h-12 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mb-2">4</div>
          <p class="text-sm text-gray-500">Success</p>
        </div>
      </div>
    </div>

    <h2 class="text-xl font-bold text-gray-800 mb-6">User Details</h2>

    <form class="space-y-6">
      <div class="grid grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Employee ID <span class="text-red-500">*</span>
          </label>
          <input type="text" placeholder="T79468" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
        </div>
      </div>

      <div class="grid grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Name <span class="text-red-500">*</span>
          </label>
          <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
          <div class="flex">
            <select class="px-3 py-2 border border-gray-300 rounded-l-lg bg-white">
              <option>🇺🇸 +1</option>
            </select>
            <input type="text" class="flex-1 px-4 py-2 border-t border-r border-b border-gray-300 rounded-r-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Official Email</label>
          <input type="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none" />
        </div>
      </div>

      <div class="grid grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Assign Role <span class="text-red-500">*</span>
          </label>
          <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            <option>Select</option>
            <option>OPERATOR</option>
            <option>SUPERVISOR</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end space-x-3 pt-6 border-t">
        <button type="button" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
          ✕ Cancel
        </button>
        <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-teal-700 transition-colors">
          Continue →
        </button>
      </div>
    </form>
  </div>
</div>
