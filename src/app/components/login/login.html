<div class="min-h-screen bg-gradient-to-br from-teal-50 to-teal-100 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 page-transition">
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <div class="flex items-center justify-center mb-4">
        <svg class="w-12 h-12 text-primary" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5zm0 18c-3.86-.96-7-5.54-7-10V8.3l7-3.11 7 3.11V10c0 4.46-3.14 9.04-7 10z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">WIMERA</h1>
      <p class="text-gray-600">Connect. Optimize. Grow</p>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="space-y-4">
        <!-- Employee ID -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Employee ID</label>
          <input
            type="text"
            name="employeeId"
            [(ngModel)]="credentials.employeeId"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 outline-none"
            placeholder="Enter your Employee ID"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            name="password"
            [(ngModel)]="credentials.password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200 outline-none"
            placeholder="Enter your password"
          />
        </div>

        <!-- Error Message -->
        @if (errorMessage) {
          <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
            {{ errorMessage }}
          </div>
        }

        <!-- Login Button -->
        <button
          type="submit"
          [disabled]="!loginForm.valid"
          class="w-full bg-primary hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
        >
          Sign In
        </button>
      </div>
    </form>

    <!-- Footer Info -->
    <div class="mt-6 text-center text-sm text-gray-500">
      <p>Demo Credentials:</p>
      <p class="font-mono text-xs mt-1">ID: admin | Password: admin123</p>
    </div>
  </div>
</div>
