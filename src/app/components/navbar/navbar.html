<nav class="fixed top-0 right-0 left-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 h-16 flex items-center justify-between px-3 sm:px-4 lg:px-6 z-30 transition-colors duration-200">
  <!-- Logo -->
  <div class="flex items-center mr-2 sm:mr-3 lg:mr-6 shrink-0">
    <div class="flex items-center">
      <img src="images/Wim_Logo.png" alt="Wimera Logo" width="32" height="32" class="w-8 h-8 sm:w-10 sm:h-10 mr-1.5 sm:mr-2" /> 
      <span class="text-base sm:text-lg lg:text-xl font-semibold text-teal-700 dark:text-teal-400">Wimera SFS</span>
    </div>
  </div>

  <!-- Navigation Menu and hide navigation menu when user has multiple plant and he is in /dashboard page -->
  <div *ngIf="showNavMenu" class="hidden xl:flex flex-1 items-center space-x-1 overflow-x-auto">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.route"
        (click)="closeMenu()"
        routerLinkActive="bg-teal-50 dark:bg-teal-900 text-teal-700 dark:text-teal-300"
        class="flex items-center px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-teal-50 dark:hover:bg-teal-900 hover:text-teal-700 dark:hover:text-teal-300 rounded-lg transition-all"
      >
        <span [innerHTML]="getSafeHtml(item.icon)" class="w-4 h-4 mr-2"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- Right Side Icons -->
  <div class="flex items-center space-x-0.5 xs:space-x-1 sm:space-x-2 lg:space-x-3 ml-1 sm:ml-2 shrink-0">
    <!-- Time Display -->
    <div class="hidden sm:flex items-center text-sm text-gray-600 dark:text-gray-300">
      <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
      </svg>
      <span class="font-medium">{{ currentTime }}</span>
    </div>

    <!-- Language -->
    <button class="hidden md:block px-3 py-1.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
      ENG
    </button>

    <!-- Theme Toggle also refresh window screen-->
    <button 
      (click)="refreshTheme()"
      class="p-1.5 sm:p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors"
      [title]="isDarkTheme ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
    >
      @if (isDarkTheme) {
        <!-- Sun Icon for Light Mode -->
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
      } @else {
        <!-- Moon Icon for Dark Mode -->
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M9 2c-1.05 0-2.05.16-3 .46 4.06 1.27 7 5.06 7 9.54 0 4.48-2.94 8.27-7 9.54.95.3 1.95.46 3 .46 5.52 0 10-4.48 10-10S14.52 2 9 2z"/>
        </svg>
      }
    </button>

    <!-- Logout -->
    <button 
      (click)="logout()"
      class="p-1.5 sm:p-2 text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900 rounded-lg transition-colors"
      title="Logout"
    >
      <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
    </button>

    <!-- Settings -->
    <button class="hidden lg:block p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors" title="Settings">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </button>

    <!-- Notifications -->
    <button class="hidden lg:block relative p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors" title="Notifications">
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
      </svg>
      <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
    </button>

    <!-- User Profile -->
    <button class="flex items-center hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg p-1 sm:p-1.5 transition-colors">
      <div class="w-7 h-7 sm:w-8 sm:h-8 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center">
        <span class="text-white font-semibold text-xs sm:text-sm">A</span>
      </div>
    </button>

    <button
      class="xl:hidden p-1.5 sm:p-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors"
      (click)="toggleMenu()"
      title="Menu">
      <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>
</nav>

<div *ngIf="isMenuOpen && showNavMenu" class="fixed top-16 left-0 right-0 z-20 xl:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-lg">
  <div class="px-3 py-2 space-y-1 max-h-[70vh] overflow-y-auto">
    @for (item of menuItems; track item.label) {
      <a
        [routerLink]="item.route"
        (click)="closeMenu()"
        routerLinkActive="bg-teal-50 dark:bg-teal-900 text-teal-700 dark:text-teal-300"
        class="flex items-center px-3 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-teal-50 dark:hover:bg-teal-900 hover:text-teal-700 dark:hover:text-teal-300 rounded-lg transition-all">
        <span [innerHTML]="getSafeHtml(item.icon)" class="w-4 h-4 mr-2"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </div>
</div>
